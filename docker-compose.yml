# docker-compose.yml — curso-adaptativo-ia
#
# Servicios:
#   moodle-db, moodle -> LMS que aloja el curso Adapt como paquete SCORM
#   lrs               -> LRS (Learning Record Store) que recibe los statements xAPI
#   middleware         -> API Node.js que consulta el LRS y llama a Claude
#
# NOTA: las versiones/tags exactas de las imágenes de Moodle se confirman y
# fijan la primera vez que se levanta el stack (ver docs/riesgos.md).
# Este archivo es el punto de partida, no un despliegue ya probado en producción.

version: "3.9"

services:
  moodle-db:
    image: mariadb:11
    container_name: curso-adaptativo-ia-moodle-db
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MARIADB_DATABASE: ${MOODLE_DB_NAME}
      MARIADB_USER: ${MOODLE_DB_USER}
      MARIADB_PASSWORD: ${MOODLE_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MOODLE_DB_PASSWORD}
    volumes:
      - moodle-db-data:/var/lib/mysql

  moodle:
    image: bitnamilegacy/moodle:5.0.2
    container_name: curso-adaptativo-ia-moodle
    restart: unless-stopped
    depends_on:
      - moodle-db
    environment:
      MOODLE_DATABASE_HOST: moodle-db
      MOODLE_DATABASE_NAME: ${MOODLE_DB_NAME}
      MOODLE_DATABASE_USER: ${MOODLE_DB_USER}
      MOODLE_DATABASE_PASSWORD: ${MOODLE_DB_PASSWORD}
      MOODLE_USERNAME: admin
      MOODLE_PASSWORD: ${MOODLE_ADMIN_PASSWORD}
      MOODLE_EMAIL: admin@example.com
    ports:
      - "8080:8080"
    volumes:
      - moodle-data:/bitnami/moodle
      - moodle-moodledata:/bitnami/moodledata

  lrs:
    # LRSQL (Yet Analytics) — un solo contenedor, mantenido activamente,
    # SQLite por defecto (sin Mongo/Redis separados). Reemplaza a Learning
    # Locker: esa imagen no existe como paquete descargable y su despliegue
    # oficial son 7 contenedores compilados con Node EOL (ver docs/riesgos.md).
    image: yetanalytics/lrsql:latest
    container_name: curso-adaptativo-ia-lrs
    restart: unless-stopped
    environment:
      LRSQL_API_KEY_DEFAULT: ${LRS_KEY}
      LRSQL_API_SECRET_DEFAULT: ${LRS_SECRET}
      LRSQL_ADMIN_USER_DEFAULT: ${LRS_ADMIN_USER}
      LRSQL_ADMIN_PASS_DEFAULT: ${LRS_ADMIN_PASSWORD}
      LRSQL_DB_NAME: db/lrsql.sqlite.db
    ports:
      - "8081:8080"
    volumes:
      - lrs-data:/lrsql/db

  middleware:
    build:
      context: ./middleware
    container_name: curso-adaptativo-ia-middleware
    restart: unless-stopped
    depends_on:
      - lrs
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL}
      LRS_ENDPOINT: ${LRS_ENDPOINT}
      LRS_KEY: ${LRS_KEY}
      LRS_SECRET: ${LRS_SECRET}
      PORT: ${MIDDLEWARE_PORT}
      STATE_DB_PATH: /app/data/bayes-state.sqlite
    ports:
      - "${MIDDLEWARE_PORT}:${MIDDLEWARE_PORT}"
    volumes:
      - middleware-data:/app/data

volumes:
  moodle-db-data:
  moodle-data:
  moodle-moodledata:
  lrs-data:
  middleware-data:
