name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  middleware:
    name: Middleware — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: middleware
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: middleware/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
